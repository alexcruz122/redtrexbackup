<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RedTrex News</title>
    <link rel="icon"
href="https://www.redtrex.com.lk/Assest/company.png">

<link rel="shortcut icon"
href="https://www.redtrex.com.lk/Assest/company.png">

<link rel="apple-touch-icon"
href="https://www.redtrex.com.lk/Assest/company.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 5%;
    position:sticky;
    top:0;
    z-index:999;
    backdrop-filter:blur(18px);
    background:rgba(10,10,10,0.75);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo-section{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo-section img{
    width:55px;
}

.logo-section h1{
    font-size:1.3rem;
}

.logo-section p{
    color:#aaa;
    font-size:0.8rem;
}

nav{
    display:flex;
    gap:22px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}

nav a:hover{
    color:#ff3434;
}

/* HERO */

.hero{
    height:450px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600&auto=format&fit=crop') center/cover;
    transform:scale(1.05);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:850px;
    padding:20px;
}

.breaking{
    display:inline-block;
    background:#ff2e2e;
    padding:8px 14px;
    border-radius:999px;
    font-size:0.8rem;
    font-weight:700;
    margin-bottom:20px;
}

.hero h2{
    font-size:3.6rem;
    margin-bottom:14px;
}

.hero p{
    color:#d0d0d0;
    font-size:1.1rem;
}

/* MAIN */

.container{
    width:90%;
    max-width:1400px;
    margin:auto;
    padding:45px 0;
}

.top-bar{
    margin-bottom:35px;
}

#searchInput{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    font-size:1rem;
    backdrop-filter:blur(14px);
}

#searchInput:focus{
    outline:none;
    border-color:#ff2e2e;
}

/* NEWS GRID */

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:26px;
}

.news-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    overflow:hidden;
    transition:0.35s ease;
    backdrop-filter:blur(16px);
}

.news-card:hover{
    transform:translateY(-8px);
    border-color:rgba(255,46,46,0.4);
    box-shadow:0 10px 40px rgba(255,0,0,0.18);
}

.news-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.news-content{
    padding:22px;
}

.news-category{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:rgba(255,46,46,0.14);
    color:#ff4b4b;
    font-size:0.75rem;
    font-weight:700;
    margin-bottom:16px;
}

.news-content h3{
    font-size:1.35rem;
    margin-bottom:14px;
    line-height:1.4;
}

.news-content p{
    color:#bdbdbd;
    line-height:1.7;
    margin-bottom:20px;
}

.news-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.news-meta span{
    color:#888;
    font-size:0.9rem;
}

.read-more{
    border:none;
    background:linear-gradient(135deg,#ff2e2e,#a60000);
    color:white;
    padding:10px 16px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.read-more:hover{
    opacity:0.85;
}

/* ARTICLE MODAL */

.article-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    backdrop-filter:blur(12px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.article-box{
    width:100%;
    max-width:950px;
    max-height:92vh;
    overflow-y:auto;
    background:#0f0f0f;
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.08);
    position:relative;
}

.article-box img{
    width:100%;
    height:380px;
    object-fit:cover;
}

.article-body{
    padding:35px;
}

.modal-category{
    display:inline-block;
    padding:7px 14px;
    border-radius:999px;
    background:rgba(255,46,46,0.14);
    color:#ff4b4b;
    font-size:0.8rem;
    font-weight:700;
    margin-bottom:18px;
}

.article-body h2{
    font-size:2.4rem;
    margin-bottom:16px;
    line-height:1.3;
}

.modal-date{
    color:#888;
    margin-bottom:28px;
}

#modalContent{
    line-height:2;
    color:#ddd;
    font-size:1.05rem;
}

.close-modal{
    position:absolute;
    top:18px;
    right:24px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.6rem;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.08);
}

/* FOOTER */

footer{
    margin-top:70px;
    padding:40px 5%;
    border-top:1px solid rgba(255,255,255,0.08);
    background:#090909;
}

.footer-content{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
}

.footer-content img{
    width:60px;
}

.footer-content p{
    color:#aaa;
}

.copyright{
    color:#666;
}

/* MOBILE */

@media(max-width:900px){

    .navbar{
        flex-direction:column;
        gap:18px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h2{
        font-size:2.4rem;
    }

    .article-body h2{
        font-size:1.9rem;
    }

    .article-box img{
        height:250px;
    }

}

</style>
</head>

<body>

<header class="navbar">

    <div class="logo-section">

        <img src="https://www.redtrex.com.lk/Assest/company.png">

        <div>
            <h1>RedTrex News</h1>
            <p>Tech • AI • Gaming • Security</p>
        </div>

    </div>

    <nav>
        <a href="https://www.redtrex.com.lk">Home</a>
        <a href="#">Latest</a>
        <a href="#">AI</a>
        <a href="#">Gaming</a>
        <a href="#">Security</a>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <span class="breaking">BREAKING NEWS</span>

        <h2>The Future Of Technology Starts Here</h2>

        <p>Daily updates from RedTrex Technologies.</p>

    </div>

</section>

<main class="container">

    <div class="top-bar">
        <input type="text" id="searchInput" placeholder="Search news...">
    </div>

    <div class="news-grid" id="newsContainer"></div>

</main>

<!-- ARTICLE MODAL -->

<div class="article-modal" id="articleModal">

    <div class="article-box">

        <div class="close-modal" onclick="closeArticle()">
            ×
        </div>

        <img id="modalImage">

        <div class="article-body">

            <span class="modal-category" id="modalCategory"></span>

            <h2 id="modalTitle"></h2>

            <p class="modal-date" id="modalDate"></p>

            <div id="modalContent"></div>

        </div>

    </div>

</div>

<footer>

    <div class="footer-content">

        <img src="https://www.redtrex.com.lk/Assest/company.png">

        <div>
            <h3>RedTrex Technologies</h3>
            <p>Modern digital solutions & technology updates.</p>
        </div>

    </div>

    <p class="copyright">
        © 2026 RedTrex Technologies. All Rights Reserved.
    </p>

</footer>

<script>

/*
==========================================================
 EASY NEWS SYSTEM
==========================================================

TO ADD NEWS:

1. Copy a news block
2. Change:
   - title
   - shortDescription
   - fullArticle
   - image
   - category
   - date

Done.
==========================================================
*/

const newsData = [

{
    title: "PayPal Finally Launches Direct Inward Payment Support in Sri Lanka After Years of Waiting",

    shortDescription:
    "In a historic milestone for Sri Lanka’s digital economy, global online payment giant PayPal has officially expanded its services to support direct cross-border inward remittances to the country, ending years of anticipation from local digital creators and entrepreneurs.",

    fullArticle: `

The breakthrough service was officially launched on May 15, 2026, at an event held under the patronage of Prime Minister Dr. Harini Amarasuriya. The initiative is a collaborative effort between the Ministry of Digital Economy, the Central Bank of Sri Lanka, and the domestic banking sector, aimed at removing long-standing technical and regulatory barriers.  Under the new system, PayPal has integrated directly with the Sri Lankan banking framework, allowing users to link their local bank accounts to receive and withdraw foreign funds seamlessly. The initial launch features three major local banking partners:  Bank of Ceylon (BOC)  Commercial Bank of Ceylon  Sampath Bank  The rollout is set to drastically alter the landscape for Sri Lanka's rapidly growing community of freelancers, tech professionals, startups, and small-to-medium enterprises (SMEs). Previously, local entrepreneurs were blocked from receiving direct PayPal transfers, forcing many to rely on complex, unofficial workarounds or overseas addresses to get paid by global clients.  "We had entrepreneurs, freelancers, and exporters delivering services to the world, but we did not have the proper platforms to support them," Prime Minister Amarasuriya stated during the launch, emphasizing that this integration ensures a secure, globally accepted, and accountable financial ecosystem.  Operating under the regulation of the Central Bank, the direct inward payment system is expected to significantly boost official foreign exchange inflows, bring greater transparency to cross-border transactions, and further integrate Sri Lanka into the global marketplace.  

    `,

    category: "Latest",

    date: "May 15, 2026",

    image:
    "https://www.onlanka.com/wp-content/uploads/2026/02/paypal-logo.jpg"
},

{
    title: "Microsoft Unveils ‘Windows K2’: A Massive Quality Reset to Save Windows 11 and Regain User Trust",

    shortDescription:
    "In a major internal culture shift, Microsoft has launched a comprehensive, long-term initiative codenamed Windows K2. The project aims to completely overhaul the core foundational elements of Windows 11, moving away from aggressive monetization and rapid feature deployment to focus on what users want most: stability, performance, and reliability.",

    fullArticle: `

According to internal sources, the K2 initiative was quietly formed in late 2025 under the leadership of Windows head Pavan Davuluri. The project is a direct response to growing public dissatisfaction with Windows 11, which has faced heavy criticism over performance drops, cluttered user interfaces, invasive advertising, and an excessive push toward unwanted AI features like Copilot.

Importantly, Windows K2 is not a new operating system or a preview for "Windows 12." Instead, it is an ongoing, multi-year internal commitment to refine and optimize the current Windows 11 ecosystem through 2027.

    `,

    category: "Latest",

    date: "May 16, 2026",

    image:
    "https://cdn.ilsoftware.it/K_Nm25UU2_OgXw4XG4gaKW4GexQ=/1120x700/filters:format(webp)/https://www.ilsoftware.it/app/uploads/2026/05/windows-K2-uscita.jpg"
},

{
    title: "Sri Lankan Freelancers Face Delay as PayPal Account Linking Feature Awaits Core Bank Updates",

    shortDescription:
    "Despite the official launch of PayPal inward remittance support in Sri Lanka, local freelancers and digital entrepreneurs have hit an immediate roadblock: they cannot yet link their bank accounts to receive payments.",

    fullArticle: `

According to PayPal's technical framework, users must successfully link their PayPal account via a partner bank's digital portal to activate the "receive" function. Without this verified link, all incoming cross-border transactions will fail.

The three launch partners—Commercial Bank, Bank of Ceylon (BOC), and Sampath Bank—have yet to push the required mobile and online banking updates due to three primary backend challenges:

<ul>
    <li><h3>API Security Integration</h3>Banks are running final penetration tests on the secure real-time API bridges connecting local accounts to PayPal's global network.</li>
    <li><h3>Compliance Automation</h3>Systems are being calibrated to meet strict Central Bank Know-Your-Customer (KYC) and Anti-Money Laundering (AML) monitoring regulations for direct foreign currency inflows.</li>
    <li><h3>App Store Approvals</h3>Finalized app updates are currently stuck in standard 24-to-72-hour review pipelines on the Google Play Store and Apple App Store.</li>
</ul>

<h3>Important Note for Users:</h3> Freelancers are strongly advised not to invoice international clients or attempt to receive funds until their respective local bank officially rolls out the update and confirms a successful account link. Bank representatives state that the necessary updates are expected to drop incrementally over the coming days.

    `,

    category: "Latest",

    date: "May 16, 2026",

    image:
    "https://imgproxy.divecdn.com/ttlyJ_6SOn_U5c-zGppZaQmLLtpn2dQaA67kh_snvzA/g:ce/rs:fill:1200:675:1/Z3M6Ly9kaXZlc2l0ZS1zdG9yYWdlL2RpdmVpbWFnZS8yWDZCV0hHLmpwZw==.webp"
}

];

const container = document.getElementById("newsContainer");
const searchInput = document.getElementById("searchInput");

function displayNews(news){

    container.innerHTML = "";

    news.forEach((article,index) => {

        const card = document.createElement("div");

        card.classList.add("news-card");

        card.innerHTML = `

            <img src="${article.image}" alt="${article.title}">

            <div class="news-content">

                <span class="news-category">
                    ${article.category}
                </span>

                <h3>${article.title}</h3>

                <p>${article.shortDescription}</p>

                <div class="news-meta">

                    <span>${article.date}</span>

                    <button class="read-more"
                    onclick="openArticle(${index})">

                        Read More

                    </button>

                </div>

            </div>

        `;

        container.appendChild(card);

    });

}

function openArticle(index){

    const article = newsData[index];

    document.getElementById("modalImage").src =
    article.image;

    document.getElementById("modalCategory").innerText =
    article.category;

    document.getElementById("modalTitle").innerText =
    article.title;

    document.getElementById("modalDate").innerText =
    article.date;

    document.getElementById("modalContent").innerHTML =
    article.fullArticle.replace(/\\n/g,"<br>");

    document.getElementById("articleModal").style.display =
    "flex";

    document.body.style.overflow = "hidden";
}

function closeArticle(){

    document.getElementById("articleModal").style.display =
    "none";

    document.body.style.overflow = "auto";
}

searchInput.addEventListener("input", () => {

    const value = searchInput.value.toLowerCase();

    const filtered = newsData.filter(article =>

        article.title.toLowerCase().includes(value) ||

        article.shortDescription.toLowerCase().includes(value) ||

        article.category.toLowerCase().includes(value)

    );

    displayNews(filtered);

});

window.onclick = function(e){

    const modal = document.getElementById("articleModal");

    if(e.target === modal){

        closeArticle();

    }

}

displayNews(newsData);

</script>

</body>
</html>
