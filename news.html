<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RedTrex News</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 5%;
    position:sticky;
    top:0;
    z-index:999;
    backdrop-filter:blur(18px);
    background:rgba(10,10,10,0.75);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo-section{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo-section img{
    width:55px;
}

.logo-section h1{
    font-size:1.3rem;
}

.logo-section p{
    color:#aaa;
    font-size:0.8rem;
}

nav{
    display:flex;
    gap:22px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}

nav a:hover{
    color:#ff3434;
}

/* HERO */

.hero{
    height:450px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600&auto=format&fit=crop') center/cover;
    transform:scale(1.05);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:850px;
    padding:20px;
}

.breaking{
    display:inline-block;
    background:#ff2e2e;
    padding:8px 14px;
    border-radius:999px;
    font-size:0.8rem;
    font-weight:700;
    margin-bottom:20px;
}

.hero h2{
    font-size:3.6rem;
    margin-bottom:14px;
}

.hero p{
    color:#d0d0d0;
    font-size:1.1rem;
}

/* MAIN */

.container{
    width:90%;
    max-width:1400px;
    margin:auto;
    padding:45px 0;
}

.top-bar{
    margin-bottom:35px;
}

#searchInput{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    font-size:1rem;
    backdrop-filter:blur(14px);
}

#searchInput:focus{
    outline:none;
    border-color:#ff2e2e;
}

/* GRID */

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:26px;
}

.news-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    overflow:hidden;
    transition:0.35s ease;
    backdrop-filter:blur(16px);
}

.news-card:hover{
    transform:translateY(-8px);
    border-color:rgba(255,46,46,0.4);
    box-shadow:0 10px 40px rgba(255,0,0,0.18);
}

.news-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.news-content{
    padding:22px;
}

.news-category{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:rgba(255,46,46,0.14);
    color:#ff4b4b;
    font-size:0.75rem;
    font-weight:700;
    margin-bottom:16px;
}

.news-content h3{
    font-size:1.35rem;
    margin-bottom:14px;
    line-height:1.4;
}

.news-content p{
    color:#bdbdbd;
    line-height:1.7;
    margin-bottom:20px;
}

.news-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.news-meta span{
    color:#888;
    font-size:0.9rem;
}

.read-more{
    border:none;
    background:linear-gradient(135deg,#ff2e2e,#a60000);
    color:white;
    padding:10px 16px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.read-more:hover{
    opacity:0.85;
}

/* FOOTER */

footer{
    margin-top:70px;
    padding:40px 5%;
    border-top:1px solid rgba(255,255,255,0.08);
    background:#090909;
}

.footer-content{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
}

.footer-content img{
    width:60px;
}

.footer-content p{
    color:#aaa;
}

.copyright{
    color:#666;
}

/* MOBILE */

@media(max-width:900px){

    .navbar{
        flex-direction:column;
        gap:18px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h2{
        font-size:2.4rem;
    }

}

</style>
</head>

<body>

<header class="navbar">

    <div class="logo-section">
        <img src="https://www.redtrex.com.lk/Assest/company.png" alt="Logo">

        <div>
            <h1>RedTrex News</h1>
            <p>Tech • AI • Gaming • Security</p>
        </div>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Latest</a>
        <a href="#">AI</a>
        <a href="#">Gaming</a>
        <a href="#">Security</a>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">
        <span class="breaking">BREAKING NEWS</span>

        <h2>The Future Of Technology Starts Here</h2>

        <p>Daily updates from RedTrex Technologies.</p>
    </div>

</section>

<main class="container">

    <div class="top-bar">
        <input type="text" id="searchInput" placeholder="Search news...">
    </div>

    <div class="news-grid" id="newsContainer"></div>

</main>

<footer>

    <div class="footer-content">
        <img src="https://www.redtrex.com.lk/Assest/company.png" alt="Logo">

        <div>
            <h3>RedTrex Technologies</h3>
            <p>Modern digital solutions & technology updates.</p>
        </div>
    </div>

    <p class="copyright">
        © 2026 RedTrex Technologies. All Rights Reserved.
    </p>

</footer>

<script>

/*
==========================================
 EASY NEWS SYSTEM
==========================================

TO ADD NEWS:

Copy a block below and edit:
- title
- description
- category
- date
- image
- link

Done.
*/

const newsData = [

{
    title: "Microsoft Expands AI Features In Windows 11",
    description: "New AI powered productivity tools are rolling out globally with improved Copilot integration.",
    category: "AI",
    date: "May 16, 2026",
    image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop",
    link: "https://www.microsoft.com"
},

{
    title: "Cybersecurity Threats Continue To Rise Worldwide",
    description: "Security researchers warn businesses to strengthen backups and account protection systems.",
    category: "Security",
    date: "May 15, 2026",
    image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop",
    link: "https://www.redtrex.com.lk"
},

{
    title: "Next Generation Gaming Hardware Is Coming",
    description: "GPU manufacturers prepare powerful next-gen hardware targeting AI and high-end gaming.",
    category: "Gaming",
    date: "May 14, 2026",
    image: "https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop",
    link: "https://www.nvidia.com"
}

];

const container = document.getElementById("newsContainer");
const searchInput = document.getElementById("searchInput");

function displayNews(news){

    container.innerHTML = "";

    news.forEach(article => {

        const card = document.createElement("div");
        card.classList.add("news-card");

        card.innerHTML = `
        
            <img src="${article.image}" alt="${article.title}">

            <div class="news-content">

                <span class="news-category">${article.category}</span>

                <h3>${article.title}</h3>

                <p>${article.description}</p>

                <div class="news-meta">

                    <span>${article.date}</span>

                    <button class="read-more"
                    onclick="window.open('${article.link}','_blank')">
                        Read More
                    </button>

                </div>

            </div>

        `;

        container.appendChild(card);

    });

}

searchInput.addEventListener("input", () => {

    const value = searchInput.value.toLowerCase();

    const filtered = newsData.filter(article =>
        article.title.toLowerCase().includes(value) ||
        article.description.toLowerCase().includes(value) ||
        article.category.toLowerCase().includes(value)
    );

    displayNews(filtered);

});

displayNews(newsData);

</script>

</body>
</html>
