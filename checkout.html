<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { color: #333; }
    ul { list-style: none; padding: 0; }
    li { padding: 10px; border-bottom: 1px solid #ccc; }
    button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Welcome to Your Orders</h1>
  <ul id="orders">
    <li>Loading orders...</li>
  </ul>
  <button id="logout">Logout</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseUrl = 'https://wnixpmoxgrlfkezocrdq.supabase.co'   // replace with your Supabase URL
    const supabaseKey = 'sb_publishable_MUSb_FCzPajqr3AoixIODw_a6wRO-6P'  // replace with your anon key
    const supabase = supabase.createClient(supabaseUrl, supabaseKey)

    // Check if user is logged in
    supabase.auth.getSession().then(({ data }) => {
      if (!data.session) {
        alert('Please log in first')
        window.location.href = 'index.html'
      } else {
        loadOrders()
      }
    })

    // Fetch orders for logged-in user
    async function loadOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false })

      const ordersList = document.getElementById('orders')
      ordersList.innerHTML = ''

      if (error) {
        ordersList.innerHTML = `<li>Error loading orders: ${error.message}</li>`
      } else if (data.length === 0) {
        ordersList.innerHTML = `<li>No orders found</li>`
      } else {
        data.forEach(order => {
          ordersList.innerHTML += `
            <li>
              <strong>${order.product_name}</strong> <br>
              Order ID: ${order.order_id} <br>
              Price: $${order.price} <br>
              Status: ${order.status} <br>
              Date: ${new Date(order.created_at).toLocaleString()}
            </li>
          `
        })
      }
    }

    // Logout button
    document.getElementById('logout').onclick = async () => {
      await supabase.auth.signOut()
      window.location.href = 'index.html'
    }
  </script>
</body>
</html>
